<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

    body{display:flex;background:#f4f6f9;}

    .sidebar{
      width:220px;height:100vh;background:#111827;color:white;padding:20px;
    }

    .sidebar h2{text-align:center;margin-bottom:30px;}
    .sidebar a{display:block;padding:10px;margin:10px 0;color:white;text-decoration:none;}

    .main{flex:1;padding:20px;}

    .header{
      background:white;padding:15px;border-radius:10px;margin-bottom:20px;
      display:flex;justify-content:space-between;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:20px;
    }

    .card{
      background:white;padding:20px;border-radius:12px;text-align:center;
    }

    .bottom-nav{display:none;}

    @media(max-width:768px){
      body{display:block;}
      .sidebar{display:none;}
      .cards{grid-template-columns:1fr 1fr;}
      .main{padding:15px;padding-bottom:80px;}
      .header{position:sticky;top:0;border-radius:0;}

      .bottom-nav{
        display:flex;position:fixed;bottom:0;width:100%;
        background:white;justify-content:space-around;padding:10px;
      }
    }
  </style>
</head>

<body>

<div class="sidebar">
  <h2>🎓 LMS</h2>
  <a href="#">Dashboard</a>
  <a href="#">Courses</a>
</div>

<div class="main">

  <div class="header">
    <h3 id="welcome"></h3>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="cards">
    <div class="card">📚 Courses</div>
    <div class="card">📝 Tests</div>
    <div class="card">📊 Results</div>
    <div class="card">⏱ Progress</div>
  </div>

</div>

<div class="bottom-nav">
  <div>🏠</div>
  <div>📚</div>
  <div>📝</div>
  <div>📊</div>
</div>

<script>
let name=localStorage.getItem("studentName")||"Student";
welcome.innerText="Welcome "+name;

function logout(){
  localStorage.clear();
  location.href="index.html";
}
</script>

</body>
</html>
